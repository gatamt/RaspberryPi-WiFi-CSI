# BlueZ configuration for pi_ble
# Applied by scripts/install_ble.sh
#
# Key settings:
#   -P battery in bluetoothd  → prevents iOS pairing popup on every connect
#   DiscoverableTimeout = 0   → always discoverable
#   LE supervision timeout    → 6000ms (Apple BLE guideline: 2-6s)
#   JustWorksRepairing        → always accept (NoInputNoOutput device)

[General]
DiscoverableTimeout = 0
PairableTimeout = 0
Name = GataPi5
JustWorksRepairing = always

[LE]
MinConnectionInterval=24
MaxConnectionInterval=40
ConnectionLatency=0
ConnectionSupervisionTimeout=600

[Policy]
AutoEnable=true
